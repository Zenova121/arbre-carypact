<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arbre du réseau — CaryPact</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #0B0E0D;
    color: #EDEFEF;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 26px 16px 60px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #3DDC84;
    font-family: 'JetBrains Mono', monospace;
    margin: 0;
  }

  h1 {
    font-size: 25px;
    font-weight: 800;
    margin: 6px 0 4px;
    letter-spacing: -0.02em;
  }

  .lede {
    font-size: 13px;
    color: #8A9196;
    margin: 0 0 26px;
  }

  .branch-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .chip {
    display: inline-flex;
    flex-direction: column;
    gap: 3px;
    padding: 8px 13px;
    background: #1B2123;
    border: 1px solid #323A3D;
    border-radius: 6px;
    min-width: 110px;
  }

  .chip.dim {
    background: #15191B;
    border-color: #262C2F;
    opacity: 0.65;
  }

  .chip-title-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chip-title {
    font-size: 13px;
    font-weight: 600;
    color: #EDEFEF;
    white-space: nowrap;
  }

  .chip-sub {
    font-size: 10.5px;
    color: #8A9196;
    font-family: 'JetBrains Mono', monospace;
  }

  .connector {
    display: flex;
    justify-content: center;
  }

  .connector-line {
    width: 1px;
    background: #2A3338;
  }

  .toly-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
  }

  .toly-card {
    padding: 12px 26px;
    border-radius: 10px;
    border: 1.5px solid #3DDC84;
    background: linear-gradient(180deg,#152019,#0F1714);
    text-align: center;
    box-shadow: 0 0 0 1px rgba(61,220,132,0.12), 0 10px 30px -10px rgba(61,220,132,0.3);
  }

  .toly-name {
    font-size: 17px;
    font-weight: 800;
  }

  .toly-sub {
    font-size: 10.5px;
    color: #8A9196;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .split-svg-wrap {
    display: flex;
    justify-content: center;
    width: 100%;
  }

  .split-svg-wrap svg {
    width: 100%;
    max-width: 900px;
    height: 40px;
  }

  .wallets-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
    width: 100%;
  }

  @media (min-width: 760px) {
    .wallets-row {
      justify-content: space-between;
      flex-wrap: nowrap;
    }
    .wallet-card {
      width: 23%;
      min-width: 0;
    }
  }

  .wallet-card {
    position: relative;
    cursor: pointer;
    background: #13161A;
    border: 1.5px solid #262C30;
    border-radius: 10px;
    padding: 14px 16px;
    width: 220px;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }

  .wallet-card:hover {
    transform: translateY(-1px);
  }

  .wallet-card.active {
    background: linear-gradient(180deg,#15231C,#0F1714);
    border-color: #2C5841;
    box-shadow: 0 0 0 1px rgba(61,220,132,0.08), 0 8px 24px -8px rgba(61,220,132,0.25);
  }

  .wallet-card.selected {
    border-color: #3DDC84 !important;
  }

  .wallet-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
  }

  .wallet-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #6B7278;
  }

  .wallet-label.active-label { color: #3DDC84; }

  .badge {
    font-size: 8.5px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .badge-active { background: rgba(61,220,132,0.14); color: #3DDC84; }
  .badge-warn { background: rgba(232,163,61,0.14); color: #E8A33D; }

  .wallet-addr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #D7DADC;
    margin-top: 8px;
    letter-spacing: -0.01em;
  }

  .wallet-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: #6B7278;
    margin-top: 2px;
  }

  .wallet-stats {
    display: flex;
    gap: 14px;
    margin-top: 11px;
    padding-top: 10px;
    border-top: 1px solid #232A2D;
  }

  .stat-num {
    font-size: 14px;
    font-weight: 700;
    color: #D7DADC;
  }

  .stat-num.green { color: #3DDC84; }

  .stat-label {
    font-size: 9px;
    color: #6B7278;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .wallet-note {
    text-align: center;
    font-size: 11px;
    color: #6B7278;
    margin: 4px 0 28px;
    font-family: 'JetBrains Mono', monospace;
  }

  .detail-box {
    background: #13161A;
    border: 1px solid #262C30;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 28px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    display: none;
  }

  .detail-box.show { display: block; }

  .detail-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .detail-addr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8A9196;
    margin-bottom: 8px;
  }

  .detail-warn {
    font-size: 12px;
    color: #E8A33D;
    line-height: 1.5;
    margin: 0;
  }

  .arrow-note {
    text-align: center;
    font-size: 10.5px;
    color: #E8A33D;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
  }

  .branch-section {
    border-radius: 10px;
    padding: 16px 14px 18px;
    margin-bottom: 30px;
  }

  .branch-section.dashed {
    border: 1px dashed #2C3438;
  }

  .branch-section.solid {
    border: 1px solid #1C2124;
  }

  .branch-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #6B7278;
    margin-bottom: 12px;
    text-align: center;
  }

  .legend-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #8A9196;
  }

  .legend-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #4F565B;
    margin-top: 36px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
var DATA = {
  toly: { nom: "Toly", u: 100, statut: "Actif" },
  upline: [
    { nom: "Barbara", statut: "Actif", note: "Tête de réseau" },
    { nom: "Olinka", niveau: "V1", u: 104, statut: "Actif", note: "Parrain direct de Toly" }
  ],
  wallets: [
    { id: "w1", label: "Wallet 1 — Principal", adresse: "0x6BE5...A338", code: "neG8Y5", perf: 0, adresses: 1, actif: false },
    { id: "w2", label: "Wallet 2", adresse: "0x3053...3793", code: "QGjLaB", perf: 8504.2, adresses: 13, actif: true,
      note: "Contient probablement Ropoama et sa descendance (déduit des chiffres de l'app — non confirmé par écrit dans Notion)" },
    { id: "w3", label: "Wallet 3", adresse: "0x5f3D...F0D9", code: "3djazm", perf: 0, adresses: 1, actif: false },
    { id: "w4", label: "Wallet 4 (?)", adresse: "0xdC16...32E9", code: null, perf: 0, adresses: 1, actif: false, nonDocumente: true }
  ],
  brancheRopoama: [
    { nom: "Ropoama", u: 4900, statut: "Actif", parrain: "Toly (Wallet 2)" },
    { nom: "Marie", sousTitre: "mère de Ropoama", u: 800, statut: "Actif", parrain: "Ropoama" },
    { nom: "Mevrick", sousTitre: "fils de Ropoama", parrain: "à confirmer" },
    { nom: "Aymerick", sousTitre: "fils de Ropoama", parrain: "à confirmer" }
  ],
  brancheManu: [
    { nom: "Manu", statut: "Actif", parrain: "indépendant" },
    { nom: "Vetea", u: 900, parrain: "Manu" },
    { nom: "Sonia", u: 143, parrain: "Manu" },
    { nom: "Romanella", u: 205, parrain: "Vetea" },
    { nom: "Jacques", u: 184, parrain: "Romanella" },
    { nom: "Faby", u: 195, parrain: "Romanella" },
    { nom: "Jeremy", u: 250, parrain: "Jacques" },
    { nom: "Nathalie", u: 139, parrain: "Jeremy" }
  ]
};

var STATUS_COLOR = { "Actif": "#3DDC84", "Inactif": "#5A6168" };
var state = { selectedWallet: null };

function fmtMoney(n) {
  var hasDecimals = n % 1 !== 0;
  return "$" + n.toLocaleString("fr-FR", { minimumFractionDigits: hasDecimals ? 2 : 0, maximumFractionDigits: 2 });
}

function el(tag, attrs, children) {
  var node = document.createElement(tag);
  attrs = attrs || {};
  for (var k in attrs) {
    if (k === "style") Object.assign(node.style, attrs[k]);
    else if (k === "onclick") node.addEventListener("click", attrs[k]);
    else if (k === "class") node.className = attrs[k];
    else node.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(function (c) {
    if (c == null) return;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

function chip(p) {
  var dim = !p.statut;
  var dotColor = p.statut ? (STATUS_COLOR[p.statut] || "#E8A33D") : "#E8A33D";
  var subParts = [];
  if (p.u != null) subParts.push(p.u + "U");
  if (p.niveau) subParts.push(p.niveau);
  if (p.parrain && p.parrain !== "indépendant") subParts.push("← " + p.parrain);
  var subText = subParts.length ? subParts.join("  ") : (p.sousTitre || null);

  var children = [
    el("div", { class: "chip-title-row" }, [
      el("span", { class: "chip-dot", style: { background: dotColor } }, []),
      el("span", { class: "chip-title" }, [p.nom])
    ])
  ];
  if (subText) {
    children.push(el("span", { class: "chip-sub" }, [subText]));
  }
  return el("div", { class: "chip" + (dim ? " dim" : "") }, children);
}

function centeredChip(p) {
  return el("div", { style: { display: "flex", justifyContent: "center" } }, [chip(p)]);
}

function branchRow(items) {
  return el("div", { class: "branch-row" }, items.map(chip));
}

function branchColumn(items, gap) {
  return el("div", {
    style: {
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      gap: (gap != null ? gap : 8) + "px"
    }
  }, items.map(chip));
}

function connector(height) {
  return el("div", { class: "connector" }, [
    el("div", { class: "connector-line", style: { height: height + "px" } }, [])
  ]);
}

function splitSvg() {
  var wrap = el("div", { class: "split-svg-wrap" }, []);
  var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 800 40");
  svg.setAttribute("preserveAspectRatio", "none");
  // trunk down from Toly
  var lines = [
    [400, 0, 400, 14],
    [50, 14, 750, 14],
    [50, 14, 50, 40],
    [283, 14, 283, 40],
    [516, 14, 516, 40],
    [750, 14, 750, 40]
  ];
  lines.forEach(function (coords) {
    var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", coords[0]);
    line.setAttribute("y1", coords[1]);
    line.setAttribute("x2", coords[2]);
    line.setAttribute("y2", coords[3]);
    line.setAttribute("stroke", "#2A3338");
    line.setAttribute("stroke-width", "1.5");
    svg.appendChild(line);
  });
  wrap.appendChild(svg);
  return wrap;
}

function walletCard(w) {
  var isSelected = state.selectedWallet && state.selectedWallet.id === w.id;
  var headChildren = [
    el("span", { class: "wallet-label" + (w.actif ? " active-label" : "") }, [w.label])
  ];
  if (w.actif) {
    headChildren.push(el("span", { class: "badge badge-active" }, ["ACTIF"]));
  }
  if (w.nonDocumente) {
    headChildren.push(el("span", { class: "badge badge-warn" }, ["NON DOC."]));
  }

  var statsChildren = [
    el("div", {}, [
      el("div", { class: "stat-num" + (w.actif ? " green" : "") }, [fmtMoney(w.perf)]),
      el("div", { class: "stat-label" }, ["performance"])
    ]),
    el("div", {}, [
      el("div", { class: "stat-num" }, [String(w.adresses)]),
      el("div", { class: "stat-label" }, ["adresses"])
    ])
  ];

  var children = [
    el("div", { class: "wallet-head" }, headChildren),
    el("div", { class: "wallet-addr" }, [w.adresse])
  ];
  if (w.code) {
    children.push(el("div", { class: "wallet-code" }, ["code: " + w.code]));
  }
  children.push(el("div", { class: "wallet-stats" }, statsChildren));

  return el("div", {
    class: "wallet-card" + (w.actif ? " active" : "") + (isSelected ? " selected" : ""),
    onclick: function () {
      state.selectedWallet = (state.selectedWallet && state.selectedWallet.id === w.id) ? null : w;
      render();
    }
  }, children);
}

function render() {
  var root = document.getElementById("app");
  root.innerHTML = "";

  root.appendChild(el("p", { class: "eyebrow" }, ["CaryPact · BOT Chain — Réseau binaire"]));
  root.appendChild(el("h1", {}, ["Arbre du réseau de Toly"]));
  root.appendChild(el("p", { class: "lede" }, ["Filiation et répartition par wallet — dernière synchronisation Notion manuelle"]));

  // Upline (Barbara above Olinka, vertically stacked)
  root.appendChild(centeredChip(DATA.upline[0]));
  root.appendChild(connector(14));
  root.appendChild(centeredChip(DATA.upline[1]));
  root.appendChild(connector(24));

  // Toly card
  var tolyWrap = el("div", { class: "toly-wrap" }, [
    el("div", { class: "toly-card" }, [
      el("div", { class: "toly-name" }, ["Toly"]),
      el("div", { class: "toly-sub" }, [DATA.toly.u + "U · " + DATA.toly.statut])
    ])
  ]);
  root.appendChild(tolyWrap);

  // Binary split visual
  root.appendChild(splitSvg());

  // Wallets row
  root.appendChild(el("div", { class: "wallets-row" }, DATA.wallets.map(walletCard)));

  root.appendChild(el("p", { class: "wallet-note" }, ["Jambe gauche / droite / débordement — non encore assignées (voir note plus bas)"]));

  // Selected wallet detail
  if (state.selectedWallet && state.selectedWallet.note) {
    var detailChildren = [
      el("div", { class: "detail-title" }, [state.selectedWallet.label]),
      el("div", { class: "detail-addr" }, [state.selectedWallet.adresse]),
      el("p", { class: "detail-warn" }, ["⚠ " + state.selectedWallet.note])
    ];
    root.appendChild(el("div", { class: "detail-box show" }, detailChildren));
  }

  // Connector to Ropoama
  root.appendChild(connector(20));
  root.appendChild(el("div", { class: "arrow-note" }, ["↓ via Wallet 2 (probable, non confirmé)"]));

  var ropoamaSection = el("div", { class: "branch-section dashed" }, [
    el("div", { class: "branch-section-title" }, ["Branche Ropoama"]),
    branchRow(DATA.brancheRopoama)
  ]);
  root.appendChild(ropoamaSection);

  // Manu branch
  root.appendChild(el("div", { class: "branch-section-title" }, ["Branche Manu — réseau indépendant"]));
  var manuSection = el("div", { class: "branch-section solid" }, [
    branchRow(DATA.brancheManu)
  ]);
  root.appendChild(manuSection);

  // Legend
  var legendItems = [];
  Object.keys(STATUS_COLOR).forEach(function (k) {
    legendItems.push(el("div", { class: "legend-item" }, [
      el("span", { class: "legend-dot", style: { background: STATUS_COLOR[k] } }, []),
      k
    ]));
  });
  legendItems.push(el("div", { class: "legend-item" }, [
    el("span", { class: "legend-dot", style: { background: "#E8A33D" } }, []),
    "Non renseigné / à confirmer"
  ]));
  root.appendChild(el("div", { class: "legend-row" }, legendItems));

  root.appendChild(el("p", { class: "footer-note" }, [
    "Source : base Notion « Réseau CaryPact » — pour rafraîchir, demande à Claude de mettre à jour cet arbre."
  ]));
}

render();
</script>
</body>
</html>
